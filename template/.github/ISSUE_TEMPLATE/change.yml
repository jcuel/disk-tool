name: OpenSpec change
description: Track a SPECBOOT change linked to openspec/changes/
title: "[change-name] "
labels: ["change"]
body:
  - type: input
    id: change-name
    attributes:
      label: Change name
      description: Folder under openspec/changes/
      placeholder: cleanup-insights
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Copy from user-story.md or define here
      value: |
        - [ ] 
    validations:
      required: true
  - type: input
    id: branch
    attributes:
      label: Target branch
      placeholder: feat/change-name
    validations:
      required: true
