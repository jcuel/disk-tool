name: Release assets

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend and embed
        run: |
          cd web && npm ci && npm run build
          cd ..
          rm -rf cmd/disk-tool/static/*
          cp -r web/dist/* cmd/disk-tool/static/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o "disk-tool${{ matrix.ext }}" ./cmd/disk-tool

      - name: Smoke version
        if: matrix.goos == 'linux'
        run: |
          chmod +x disk-tool
          ./disk-tool version

      - name: Package artifact
        run: |
          mkdir -p dist
          name="disk-tool-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          cp "disk-tool${{ matrix.ext }}" "dist/${name}"

      - uses: actions/upload-artifact@v4
        with:
          name: disk-tool-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  upload-release:
    name: Upload to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: disk-tool-*
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
