name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  test-linux:
    name: Linux — unit + API smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web && npm ci && npm run build

      - name: Embed static assets
        run: |
          rm -rf cmd/disk-tool/static/*
          cp -r web/dist/* cmd/disk-tool/static/

      - name: Unit tests
        run: go test -race -count=1 ./...

      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Build binary
        run: go build -o bin/disk-tool ./cmd/disk-tool

      - name: API smoke
        run: bash scripts/smoke-api.sh ./bin/disk-tool

  test-windows:
    name: Windows — unit + API smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Govulncheck
        shell: pwsh
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: API smoke
        shell: pwsh
        run: ./scripts/smoke-api.ps1

  docker-smoke:
    name: Linux — Docker smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker CLI scan + API smoke
        run: bash scripts/smoke-docker.sh

  e2e-linux:
    name: Linux — Cypress E2E
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.11"
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Cypress E2E
        run: bash scripts/e2e-run.sh

      - name: Upload Cypress screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-pr-${{ github.event.pull_request.number || github.run_number }}
          path: web/cypress/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment PR with inline screenshots
        id: inline-screenshots
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: opengisch/comment-pr-with-images@upload_only
        with:
          images: "web/cypress/screenshots/**/*.png"
          upload_to: github_branch
          custom_attachment_msg: "E2E UI snapshots (run ${{ github.run_id }})"
          edit_previous_comment: true

      - name: Fallback PR comment (artifact link)
        if: github.event_name == 'pull_request' && always() && steps.inline-screenshots.outcome != 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-tag: e2e-screenshots-fallback
          edit-mode: replace
          body: |
            ## E2E UI snapshots

            Inline screenshot upload was unavailable for this run. Download PNGs from the [workflow run artifacts](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) (`cypress-screenshots-pr-${{ github.event.pull_request.number }}`).

  security:
    name: Security — Trivy
    runs-on: ubuntu-latest
    needs: [test-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          skip-dirs: web/node_modules
          trivyignores: .trivyignore

      - name: Build image for container scan
        run: docker build -t disk-tool:ci .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: disk-tool:ci
          severity: CRITICAL,HIGH
          exit-code: "1"
